# Solid Queue Recurring Jobs Configuration
# Documentation: https://github.com/basecamp/solid_queue#recurring-tasks

# Production schedule - runs in production environment
production:
  # Attendance Breach Scanner - Daily at 2:00 AM
  attendance_breach_scan:
    class: AttendanceBreachScanJob
    schedule: "0 2 * * *"  # Cron format: minute hour day month weekday
    queue: default
    
  # Payroll Calculator - Monthly on 1st day at 3:00 AM
  payroll_compute:
    class: PayrollComputeJob
    schedule: "0 3 1 * *"  # Runs at 3:00 AM on the 1st of every month
    queue: default

  # Payment Reconciliation - Daily at 11:00 PM
  payment_reconciliation:
    class: PaymentReconciliationJob
    schedule: "0 23 * * *"  # Runs at 11:00 PM every day
    queue: default

# Development schedule - for testing recurring jobs locally
development:
  # Attendance Breach Scanner - Every hour for testing
  attendance_breach_scan:
    class: AttendanceBreachScanJob
    schedule: "0 * * * *"  # Every hour at minute 0
    queue: default
    
  # Payroll Calculator - Daily at midnight for testing
  payroll_compute:
    class: PayrollComputeJob
    schedule: "0 0 * * *"  # Daily at midnight
    queue: default

  # Payment Reconciliation - Every 6 hours for testing
  payment_reconciliation:
    class: PaymentReconciliationJob
    schedule: "0 */6 * * *"  # Every 6 hours
    queue: default

# Test environment - no recurring jobs
test:
  # Empty - recurring jobs disabled in test environment
